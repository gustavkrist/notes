site_name: Gustav's Notes
site_url: https://example.com/
use_directory_urls: false
theme:
  name: material
  custom_dir: theme
  lang: en
  icon:
    logo: material/library-outline
  favicon: images/favicon.png
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - header.autohide
  palette:
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
markdown_extensions:
  - pymdownx.emoji:
      emoji_index: !!python/name:materialx.emoji.twemoji 
      emoji_generator: !!python/name:materialx.emoji.to_svg
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.tasklist:
      custom_checkbox: true
  - footnotes
  - pymdownx.tabbed:
      alternate_style: true
  - abbr
  - meta
  - tables
  - toc:
      permalink: ""
      title: On this page
      slugify: !!python/name:pymdownx.slugs.uslugify
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: math
          class: arithmatex
          format: !!python/object/apply:pymdownx.arithmatex.arithmatex_fenced_format {kwds: {which: generic}}
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      use_pygments: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.betterem
  - markdown.extensions.attr_list
  - markdown.extensions.def_list
  - markdown.extensions.md_in_html
  - pymdownx.snippets
  - pymdownx.keys
extra_css:
  - https://cdn.jsdelivr.net/npm/katex@0.15.3/dist/katex.min.css
  - stylesheets/katex.css
  - stylesheets/extra.css
  - stylesheets/link.css
extra_javascript:
  # - javascripts/mathjax.js
  # - https://polyfill.io/v3/polyfill.min.js?features=es6
  # - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - javascripts/katex.js
  - https://cdn.jsdelivr.net/npm/katex@0.15.3/dist/katex.min.js
  - https://unpkg.com/mermaid@8.6.4/dist/mermaid.min.js
plugins:
  - search:
      lang: en
  - localsearch
  - minify:
      minify_html: true
